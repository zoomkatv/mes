<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitask's</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji.css@3.0.0/dist/emoji.min.css">
</head>
<body>
    <!-- Экран аутентификации -->
    <div id="auth-screen">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">Регистрация</div>
            </div>
            
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" placeholder="Введите имя пользователя">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль">
                </div>
                <button class="auth-btn" onclick="login()">Войти</button>
                <div id="login-error" class="error-message"></div>
            </div>
            
            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="register-username" placeholder="Придумайте имя пользователя">
                </div>
                <div class="form-group">
                    <label>Полное имя</label>
                    <input type="text" id="register-fullname" placeholder="Ваше полное имя">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="register-password" placeholder="Придумайте пароль">
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="register-confirm" placeholder="Повторите пароль">
                </div>
                <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
                <div id="register-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="main-app">
        <div class="app-container">
            <!-- Левая панель -->
            <div class="left-panel">
                <div class="user-header">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">⚙</div>
                        <div class="user-details">
                            <div class="user-name" id="current-username"></div>
                            <div class="user-status" id="user-status">В сети</div>
                        </div>
                        <button class="logout-btn" onclick="logout()">Выйти</button>
                        <button class="logout-btn" style="background: #10b981;" onclick="showProfile()">⚙</button>
                    </div>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchLeftTab('chats')">Чаты</button>
                    <button class="tab-btn" onclick="switchLeftTab('users')">Контакты</button>
                    <button class="tab-btn create-chat" onclick="createGroupChat()">+</button>
                </div>
                
                <div class="tab-content">
                    <div id="chats-tab" class="tab-pane active">
                        <div id="chats-list"></div>
                    </div>
                    
                    <div id="users-tab" class="tab-pane">
                        <div id="users-list"></div>
                    </div>
                </div>
            </div>
            
            <!-- Центральная панель (ЧАТ) -->
            <div class="chat-panel">
                <div class="chat-header">
                    <div>
                        <div class="chat-title" id="current-chat-name">Выберите чат</div>
                        <div class="chat-status" id="current-chat-status"></div>
                    </div>
                    <div>
                        <button class="add-users-btn" id="add-users-btn" style="display: none;" onclick="showAddUsersModal()">+ Добавить</button>
                    </div>
                </div>
                
                <div class="messages-container" id="messages"></div>
                
                <div class="chat-input">
                    <form onsubmit="sendMessage(event)" class="message-form">
                        <button type="button" class="attach-btn" onclick="attachFile()" title="Прикрепить файл">📎</button>
                        <input type="text" id="message-input" placeholder="Напишите сообщение..." autocomplete="off">
                        <button type="button" class="emoji-btn" onclick="toggleEmojiPanel()" title="Эмодзи">😊</button>
                        <button type="submit" class="send-btn">Отправить</button>
                    </form>
                </div>

                <!-- Панель эмодзи -->
                <div class="emoji-panel" id="emoji-panel" style="display: none;">
                    <!-- Категории эмодзи -->
                    <div class="emoji-categories" id="emoji-categories">
                        <button class="emoji-cat active" data-cat="smile">😊</button>
                        <button class="emoji-cat" data-cat="people">👋</button>
                        <button class="emoji-cat" data-cat="animals">🐶</button>
                        <button class="emoji-cat" data-cat="food">🍔</button>
                        <button class="emoji-cat" data-cat="activities">⚽</button>
                        <button class="emoji-cat" data-cat="travel">🚗</button>
                        <button class="emoji-cat" data-cat="objects">💡</button>
                        <button class="emoji-cat" data-cat="symbols">❤️</button>
                        <button class="emoji-cat" data-cat="flags">🏁</button>
                        <button class="emoji-cat" data-cat="recent">🕒</button>
                    </div>

                    <!-- Сетка эмодзи -->
                    <div class="emoji-grid" id="emoji-grid"></div>
                </div>
            </div> <!-- Закрываем chat-panel -->
            
            <!-- Правая панель (ЗАДАЧИ) -->
            <div class="right-panel">
                <div class="panel-header">
                    <h3>Задачи</h3>
                    <button class="new-task-btn" onclick="showTaskModal()">+ Новая</button>
                </div>
                
                <div class="tasks-container" id="tasks-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div>Нет задач</div>
                    </div>
                </div>
            </div>
        </div> <!-- Закрываем app-container -->
    </div> <!-- Закрываем main-app -->

    <!-- Модальное окно создания задачи -->
    <div class="modal" id="task-modal">
        <h3>Создать задачу</h3>
        
        <div class="form-group">
            <label>Название</label>
            <input type="text" id="task-title" placeholder="Введите название задачи">
        </div>
        
        <div class="form-group">
            <label>Описание</label>
            <textarea id="task-description" placeholder="Введите описание" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label>Теги</label>
            <div class="checkbox-group">
                <label><input type="checkbox" value="urgent"> 🔴 Срочно</label>
                <label><input type="checkbox" value="important"> 🟡 Важно</label>
                <label><input type="checkbox" value="bug"> 🐛 Баг</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>Дедлайн</label>
            <input type="date" id="task-deadline">
        </div>
        
        <div class="modal-buttons">
            <button onclick="createTask()">Создать</button>
            <button onclick="closeTaskModal()">Отмена</button>
        </div>
    </div>

    <!-- Модальное окно профиля -->
    <div class="modal profile-modal" id="profile-modal">
        <h3>Профиль</h3>
        
        <div class="profile-avatar" id="profile-avatar" onclick="uploadAvatar()">
            <img id="avatar-img" class="avatar-img" style="display: none;">
            <span id="avatar-text">👤</span>
        </div>
        
        <div class="profile-field">
            <label>Имя пользователя</label>
            <input type="text" id="profile-username" readonly>
        </div>
        
        <div class="profile-field">
            <label>Полное имя</label>
            <input type="text" id="profile-fullname" placeholder="Введите полное имя">
        </div>
        
        <div class="modal-buttons">
            <button onclick="saveProfile()">Сохранить</button>
            <button onclick="closeProfileModal()">Закрыть</button>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-overlay" onclick="closeAllModals()"></div>

    <!-- Индикатор загрузки -->
    <div class="loading-overlay" style="display: none;">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loading-text">Загрузка...</div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
